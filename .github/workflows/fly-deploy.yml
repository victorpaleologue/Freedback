name: Deploy (Fly.io)

# Continuous deployment of the demo servers to Fly.io (docs/hosting.md):
#   * feedback (demo) server  -> app in deploy/fly/feedback.toml
#   * discovery server        -> app in deploy/fly/discovery.toml
#
# GUARDED: the deploy job runs only when a `FLY_API_TOKEN` repo secret is
# present, via the `guard` job below — an absent token skips deploy cleanly, so
# a push never fails for want of a token. To turn it on, create a Fly access
# token and add it as the secret — see docs/hosting.md ("Automated
# deployment"). The apps are created on first run (idempotent), so you don't
# need flyctl locally.
#
# Each successful deploy is recorded as a GitHub Deployment (native Actions
# `environment:` block on the deploy job) — this is what makes the live URL
# show up under the repo's "Environments" panel / deployments feed.
# `<app>.fly.dev` is used as the environment URL because it always resolves
# immediately after deploy, unlike an optional custom subdomain that may not
# have DNS/certs attached yet.
#
# Why a separate `guard` job instead of `if: secrets.FLY_API_TOKEN != ''` on
# `deploy` directly: a job that declares `environment:` resolves environment
# protection rules in an earlier phase, before secrets are available, so
# `secrets` is NOT a legal named-value in THAT job's own `if:` (confirmed: this
# exact expression on the deploy job itself fails workflow_dispatch validation
# with "Unrecognized named-value: 'secrets'"). Checking the secret in a plain
# guard job with no `environment:` and passing the result via `needs.*.outputs`
# — a context that IS available in a job `if:` regardless of `environment:` —
# sidesteps the restriction.
on:
  push:
    branches: [main]
    paths:
      # The image bundles all three servers, so any change to the server code,
      # the build, or the Fly config should redeploy the demo.
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "deploy/fly/**"
      - ".github/workflows/fly-deploy.yml"
  workflow_dispatch:

# One deploy at a time; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: fly-deploy
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write # required for the `environment:` block to record a Deployment

jobs:
  guard:
    name: check FLY_API_TOKEN
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "FLY_API_TOKEN is not set — skipping Fly.io deploy (see docs/hosting.md)."
          fi

  deploy:
    name: deploy ${{ matrix.config }}
    needs: guard
    if: ${{ needs.guard.outputs.has_token == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      # Independent apps — deploy both, don't abort one if the other fails.
      fail-fast: false
      matrix:
        config: [feedback, discovery]
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # Optional: set a repo variable FLY_ORG to deploy under a non-personal org.
      FLY_ORG: ${{ vars.FLY_ORG || 'personal' }}
    # Records a GitHub Deployment for this run. `name` must be resolvable
    # up front (matrix/vars/needs only — no step outputs), `url` is applied
    # once the job finishes and can reference step outputs.
    environment:
      name: fly-${{ matrix.config }}
      url: ${{ steps.app.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve the Fly app name + URL
        id: app
        run: |
          app="$(grep -m1 '^app *= *"' deploy/fly/${{ matrix.config }}.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "name=$app" >> "$GITHUB_OUTPUT"
          echo "url=https://$app.fly.dev" >> "$GITHUB_OUTPUT"

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create the app if it doesn't exist (idempotent)
        run: |
          echo "Ensuring Fly app '${{ steps.app.outputs.name }}' exists in org '$FLY_ORG'…"
          flyctl apps create "${{ steps.app.outputs.name }}" --org "$FLY_ORG" || echo "app already exists (or create not permitted by this token) — continuing"

      - name: Deploy
        # Remote builders (no Docker in CI). The build context is the repo root
        # so the workspace Dockerfile can see every crate; --config selects which
        # app/process to deploy. The image + env/[processes] come from the toml.
        run: flyctl deploy --remote-only --config deploy/fly/${{ matrix.config }}.toml
