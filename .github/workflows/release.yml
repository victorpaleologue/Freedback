name: Release

# Tagged releases publish redistributable artifacts (issue #11):
#   * static, dependency-free `x86_64-unknown-linux-musl` binaries for all five
#     executables, built with cargo-zigbuild (zig as the C cross-compiler — `ring`
#     pulls C even though every backend here is pure-Rust rustls + in-memory
#     Oxigraph, so no OpenSSL/RocksDB/Clang is needed);
#   * the browser `wasm32-unknown-unknown` build of the protocol core + cli-client.
# Both are attached to the GitHub Release for the tag, with SHA-256 sums.
#
# Cut a release one of two ways:
#   * push a semver tag:            git tag v1.0.0 && git push origin v1.0.0
#   * run this workflow manually with a `tag` input (Actions → Release → Run
#     workflow → tag = v1.0.0). The tag is created server-side at the current
#     commit by the publish step, so it works even where pushing tags is blocked.
# Manual dispatch WITHOUT a `tag` just builds the artifacts (smoke test, no Release).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create + publish (e.g. v1.0.0). Leave empty to only build (smoke test)."
        required: false
        type: string

permissions:
  contents: write # create the Release, the tag, and upload assets

env:
  CARGO_TERM_COLOR: always
  # The release tag: the pushed tag, or the manual `tag` input. On a tag-less
  # smoke-test dispatch this is the branch name and publish is skipped.
  TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  # --- static Linux binaries (musl) ----------------------------------------
  musl-binaries:
    name: static binaries (x86_64-linux-musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + musl target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl
      # zig is the C cross-compiler cargo-zigbuild drives; the pip package is the
      # simplest reproducible source and cargo-zigbuild auto-detects it.
      - name: Install zig + cargo-zigbuild
        run: pip3 install ziglang
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - name: Build static binaries (in-memory backend; no Clang/RocksDB)
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-musl \
            -p freedback-feedback-server \
            -p freedback-discovery-server \
            -p freedback-collection-server \
            -p freedback-cli-client \
            -p freedback-advanced-client
      - name: Package
        run: |
          mkdir -p dist
          out="target/x86_64-unknown-linux-musl/release"
          name="freedback-${TAG}-x86_64-linux-musl"
          tar -C "$out" -czf "dist/${name}.tar.gz" \
            freedback-feedback-server \
            freedback-discovery-server \
            freedback-collection-server \
            freedback \
            freedback-sync
          (cd dist && sha256sum *.tar.gz > "${name}.sha256")
          ls -l dist
      - uses: actions/upload-artifact@v4
        with:
          name: musl-binaries
          path: dist/

  # --- browser wasm package ------------------------------------------------
  wasm-package:
    name: wasm package (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + wasm target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm-release
      # `cargo rustc --crate-type cdylib` emits an actual `.wasm` (the lib crates
      # are rlib by default — `cargo build` only type-checks them for wasm). This
      # keeps Cargo.toml unchanged while producing a real artifact.
      - name: Build wasm (protocol-lib core + cli-client lib)
        run: |
          cargo rustc --release -p freedback-protocol \
            --no-default-features --features wasm \
            --target wasm32-unknown-unknown --lib --crate-type cdylib
          cargo rustc --release -p freedback-cli-client \
            --no-default-features --features wasm \
            --target wasm32-unknown-unknown --lib --crate-type cdylib
      - name: Package
        run: |
          mkdir -p dist
          out="target/wasm32-unknown-unknown/release"
          name="freedback-wasm-${TAG}"
          # The two wasm modules plus the served ontology, so a browser consumer
          # has the wasm + the pinned @context/shapes in one bundle.
          tar -czf "dist/${name}.tar.gz" \
            -C "$out" freedback_protocol.wasm freedback_cli_client.wasm \
            -C "$GITHUB_WORKSPACE" ontology
          (cd dist && sha256sum *.tar.gz > "${name}.sha256")
          ls -l dist
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-package
          path: dist/

  # --- publish the GitHub Release ------------------------------------------
  publish:
    name: publish release
    needs: [musl-binaries, wasm-package]
    runs-on: ubuntu-latest
    # Publish on a pushed tag, or a manual dispatch whose `tag` input is a vN
    # version. A tag-less smoke-test dispatch (TAG = branch name) is skipped.
    if: ${{ startsWith(inputs.tag || github.ref_name, 'v') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) \
            -exec cp {} release/ \;
          ls -l release
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          # On manual dispatch the tag may not exist yet — create it at this commit.
          tag_name: ${{ env.TAG }}
          target_commitish: ${{ github.sha }}
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # --- publish @freedback/widgets to npm (guarded) -------------------------
  # On a `vN` tag, publish the widget package to npm — but ONLY if an NPM_TOKEN
  # repo secret is present. Until the owner reserves the `@freedback` npm scope
  # and adds NPM_TOKEN (see docs/deployment.md), this job is skipped cleanly, so
  # the release never fails for want of a token. The dist bundles are built fresh
  # from the canonical source by the package's `prepublishOnly` hook.
  publish-npm-widgets:
    name: publish @freedback/widgets (npm)
    needs: [publish]
    runs-on: ubuntu-latest
    # Guard: publish only on a vN tag AND only when the NPM_TOKEN secret is set.
    # `secrets` is readable in a job-level `if`, so an absent token skips the job
    # cleanly (no error) — the release never fails for want of a token. Reserve
    # the `@freedback` npm scope + add the NPM_TOKEN secret to enable it (see
    # docs/deployment.md).
    if: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install widget package deps (pinned via lockfile)
        working-directory: widgets
        run: npm ci
      - name: Publish to npm (public scoped package)
        working-directory: widgets
        # `prepublishOnly` builds the dist bundles + runs the unit tests; the
        # scoped package needs `--access public` on first publish. The version is
        # the workspace version (1.0.0); npm rejects republishing the same one.
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
