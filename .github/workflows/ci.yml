name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Native: format, lint, test the whole workspace.
  native:
    name: native (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + components)
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - name: Install Clang (Oxigraph/RocksDB native build)
        run: sudo apt-get update && sudo apt-get install -y clang
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features
      - name: test
        run: cargo test --workspace --all-features

  # WASM: the dual-target crates must build for the browser target.
  wasm:
    name: wasm32 (browser build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + wasm target)
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: build protocol-lib (wasm)
        run: cargo build -p freedback-protocol --no-default-features --features wasm --target wasm32-unknown-unknown
      - name: build cli-client lib (wasm)
        run: cargo build -p freedback-cli-client --no-default-features --features wasm --target wasm32-unknown-unknown --lib

  # musl: the static-binary target the release pipeline ships (issue #11). Keeps
  # the `x86_64-unknown-linux-musl` build green so a tag never fails to cut.
  musl:
    name: x86_64-linux-musl (static build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + musl target)
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl
      - name: Install zig + cargo-zigbuild
        run: pip3 install ziglang
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - name: Build all server + client binaries (static musl)
        run: |
          cargo zigbuild --target x86_64-unknown-linux-musl \
            -p freedback-feedback-server \
            -p freedback-discovery-server \
            -p freedback-collection-server \
            -p freedback-cli-client \
            -p freedback-advanced-client

  # Widgets / extension: the JS must parse and the pure helpers must pass.
  widgets:
    name: widgets (js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-check JS
        run: |
          node --check widgets/freedback-widgets.js
          node --check widgets/test.cjs
          node --check widgets/e2e/serve.cjs
          node --check widgets/e2e/run-e2e.cjs
          node --check widgets/e2e/widgets.spec.cjs
          node --check widgets/e2e/playwright.config.cjs
          node --check firefox-extension/popup.js
      - name: Validate extension manifest is JSON
        run: node -e "JSON.parse(require('fs').readFileSync('firefox-extension/manifest.json','utf8'))"
      - name: Widget helper unit tests
        run: node widgets/test.cjs

  # Widgets E2E: render the custom elements in a real browser (Chromium) against
  # an in-process feedback + collection stack and drive publish + read-back for
  # every widget kind over both the self-signed (data-sign / WebCrypto) and the
  # OAuth bearer (data-token) paths. See widgets/e2e/. The stack uses the
  # in-memory store (oxigraph default feature, RocksDB off) so no Clang is needed.
  widgets-e2e:
    name: widgets (e2e · headless browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Build server binaries (in-memory store; no Clang/RocksDB)
        run: cargo build -p freedback-feedback-server -p freedback-collection-server
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright (pinned via lockfile)
        working-directory: widgets
        run: npm ci
      - name: Install Chromium only (with OS deps)
        working-directory: widgets
        run: npx playwright install --with-deps chromium
      - name: Run widgets E2E against the in-process stack
        working-directory: widgets
        run: node e2e/run-e2e.cjs
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            widgets/playwright-report
            widgets/test-results
          if-no-files-found: ignore
          retention-days: 7

  # Ontology: the served RDF/JSON-LD artifacts must parse.
  ontology:
    name: ontology (parse checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rapper (raptor2) + jq
        run: sudo apt-get update && sudo apt-get install -y raptor2-utils jq
      - name: Validate Turtle (ontology + shapes)
        run: |
          rapper -i turtle -c ontology/freedback.ttl
          rapper -i turtle -c ontology/shapes.ttl
      - name: Validate JSON-LD context is well-formed JSON
        run: jq -e . ontology/context.jsonld > /dev/null
      - name: Validate vendored well-known contexts are well-formed JSON
        run: |
          jq -e . ontology/vendor/anno.jsonld > /dev/null
          jq -e . ontology/vendor/schema-rating.jsonld > /dev/null
