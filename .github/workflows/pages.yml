name: Pages

# Publishes the static protocol artifacts so the pinned `freedback.net` IRIs
# resolve: the `@context`, the vocabulary, the SHACL shapes / validation profile,
# plus the drop-in widget script. Pages is static-only — it never runs any of the
# servers (see docs/adr / roadmap M10).
#
# Site layout:
#   /            lightweight static landing page (site/index.html — no JS, ~3 KB;
#                the most-hit URL, so it must stay tiny) + any other static demo
#                pages under site/ (copied verbatim).
#   /demo/       the rich React widget showcase (demo-react/, built with
#                base=/demo/), running against an in-browser mock backend.
#   /ns, /profile, /widgets   the pinned protocol artifacts.
on:
  push:
    branches: [main]
    paths:
      - "ontology/**"
      - "site/**"
      - "widgets/**"
      - "demo-react/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: demo-react/package-lock.json
      - name: Build the React widget showcase (served at /demo/)
        working-directory: demo-react
        # Keep the bundled widget script in lockstep with the canonical source:
        # the build embeds public/freedback-widgets.js, but the canonical copy is
        # widgets/freedback-widgets.js — sync it before building so they cannot
        # drift. (The /widgets/* copy below also serves the canonical script.)
        run: |
          cp ../widgets/freedback-widgets.js public/freedback-widgets.js
          npm ci
          npm run build
      - name: Assemble the static site
        run: |
          mkdir -p _site
          # 1) The lightweight static landing page + any other static pages under
          #    site/ own the root. Copy the whole tree verbatim (no build step) —
          #    site/index.html is the ~3 KB landing page, and further static demo
          #    pages (e.g. site/<name>/) ride along automatically.
          cp -r site/. _site/
          # 2) The rich React showcase is NOT the landing page — it lives at
          #    /demo/ (built with base=/demo/ so its asset URLs are self-contained).
          mkdir -p _site/demo
          cp -r demo-react/dist/. _site/demo/
          mkdir -p _site/ns _site/profile/1 _site/widgets
          # The pinned protocol artifacts, at the URLs context.rs pins:
          #   FREEDBACK     https://freedback.net/ns#
          #   CONTEXT_URL   https://freedback.net/ns/context.jsonld
          #   PROFILE_URL   https://freedback.net/profile/1
          cp ontology/context.jsonld _site/ns/context.jsonld
          cp ontology/freedback.ttl  _site/ns/freedback.ttl
          cp ontology/shapes.ttl     _site/ns/shapes.ttl
          # The vocabulary doc at the namespace base, so `https://freedback.net/ns`
          # dereferences (Pages serves /ns → /ns/index via the .ttl copy).
          cp ontology/freedback.ttl  _site/ns/index.ttl
          # The validation profile (dcterms:conformsTo target) dereferences to the
          # SHACL shapes it pins. `profile/1/index.html` answers /profile/1.
          cp ontology/shapes.ttl     _site/profile/1/shapes.ttl
          {
            echo '<!doctype html><meta charset="utf-8"><title>Freedback profile/1</title>'
            echo '<h1>Freedback validation profile <code>freedback/1</code></h1>'
            echo '<p>The profile pinned by <code>dcterms:conformsTo</code>. It is the'
            echo 'SHACL shapes at <a href="shapes.ttl">shapes.ttl</a> over the'
            echo '<a href="/ns/context.jsonld">@context</a> /'
            echo '<a href="/ns/freedback.ttl">vocabulary</a>.</p>'
          } > _site/profile/1/index.html
          # Drop-in widget script + demo, served at a stable CDN-style URL.
          cp widgets/freedback-widgets.js _site/widgets/freedback-widgets.js
          cp widgets/demo.html            _site/widgets/demo.html
          # Custom domain: GitHub Pages reads this CNAME and provisions HTTPS once
          # the apex DNS points at the Pages IPs (see docs/deployment.md).
          echo 'freedback.net' > _site/CNAME
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
