name: Container

# Validates that the deployment image builds. Triggered when deploy config or
# the locked dependency set changes (the day-to-day code build is covered by
# ci.yml); also runnable on demand.
on:
  push:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
      - "Cargo.lock"
      - ".github/workflows/container.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: freedback:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
