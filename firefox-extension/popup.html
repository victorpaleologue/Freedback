<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 13px/1.5 system-ui, sans-serif; width: 22rem; margin: 0; padding: .75rem; }
    h1 { font-size: 14px; margin: 0 0 .25rem; }
    .url { color: #555; word-break: break-all; font-size: 11px; margin-bottom: .5rem; }
    .cfg { display: flex; gap: .25rem; margin-bottom: .5rem; }
    .cfg input { flex: 1; padding: .25rem; }
    .item { border-top: 1px solid #eee; padding: .35rem 0; }
    .muted { color: #888; }
    .star { color: #e8a000; }
  </style>
</head>
<body>
  <h1>Freedback</h1>
  <div class="url" id="url">…</div>
  <div class="cfg">
    <input id="server" placeholder="collection server, e.g. http://localhost:8100" />
    <button id="go">Load</button>
  </div>
  <div id="out" class="muted">Set a collection server and click Load.</div>
  <script src="popup.js"></script>
</body>
</html>
