<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Freedback — live widget showcase</title>
    <meta
      name="description"
      content="A federated, open feedback protocol carried as W3C Web Annotations. Try the drop-in widgets live — publishing real, public feedback to a live demo server."
    />
    <!--
      The shipped, vanilla Web Components (component 3), loaded verbatim from
      widgets/freedback-widgets.js. It registers the custom elements
      (<freedback-stars> etc.) on a global side-effecting IIFE. Loaded as a
      classic <script> in <head> so the elements are defined before React mounts
      and renders them. No mock: the widgets read from and publish to the live
      demo server (see src/App.jsx).
    -->
    <script src="/freedback-widgets.js"></script>
    <!--
      No-FOUC theme init: apply a pinned theme (set by the in-app toggle, shared
      localStorage key "fb-theme") BEFORE first paint. With no pinned choice the
      page follows the OS via prefers-color-scheme (see src/styles.css). Mirrors
      site/theme.js so /demo/ behaves like the static pages.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("fb-theme");
          if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
